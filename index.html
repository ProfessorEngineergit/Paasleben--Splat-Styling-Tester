<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Splat Styling Tester</title>
  </head>
  <body>
    <div id="app"></div>
    <div id="custom-cursor" class="custom-cursor"><div class="dot"></div></div>

    <div id="detail-overlay" class="hidden">
      <div class="overlay-content">
        <h2 id="overlay-title">Title</h2>
        <div id="overlay-body">
          <p>Willkommen an diesem besonderen Ort. Entdecke die Umgebung durch unsere interaktive Ansicht. Klicke auf die Schilder, um mehr über die jeweiligen Bereiche zu erfahren.</p>
        </div>
        <button id="overlay-close">
          <span>Zurück zur Karte</span>
          <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        </button>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
